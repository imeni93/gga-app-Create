<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>国兴机工艺计算</title>

    <style>
        /* ===== 全局变量 ===== */
        :root {
            --glass-outer: rgba(255, 255, 255, 0.52);
            --glass-mid: rgba(255, 255, 255, 0.34);
            --glass-border: rgba(255, 255, 255, 0.75);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --input-bg: linear-gradient(180deg, rgba(255, 255, 255, 0.95) 0%, rgba(248, 250, 255, 0.88) 100%);
            --btn-primary: linear-gradient(135deg, #6366f1 0%, #818cf8 50%, #a78bfa 100%);
            --btn-shadow: 0 10px 28px rgba(99, 102, 241, 0.28), 0 0 0 1px rgba(255, 255, 255, 0.25) inset;
            --bg-page: #edf2f9;
            --radius: 22px;
        }

        [data-theme="dark"] {
            --glass-outer: rgba(28, 34, 52, 0.66);
            --glass-mid: rgba(28, 34, 52, 0.48);
            --glass-border: rgba(255, 255, 255, 0.10);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --input-bg: linear-gradient(180deg, rgba(51, 65, 85, 0.95) 0%, rgba(30, 41, 59, 0.90) 100%);
            --btn-shadow: 0 10px 28px rgba(129, 140, 248, 0.38), 0 0 0 1px rgba(255, 255, 255, 0.08) inset;
            --bg-page: #080e1a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 70px 16px 24px;
            background: var(--bg-page);
            color: var(--text-primary);
            font-size: 16px;
            transition: all 0.3s;
        }

        .app {
            width: 100%;
            max-width: 520px;
        }

        /* ===== 头部 ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .logo span {
            background: linear-gradient(135deg, #6366f1, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo small {
            font-size: 11px;
            color: var(--text-muted);
        }
        .actions {
            display: flex;
            gap: 8px;
        }
        .actions button {
            padding: 7px 14px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: var(--glass-outer);
            backdrop-filter: blur(14px);
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .actions button:hover {
            background: var(--glass-mid);
        }

        /* ===== Tabs ===== */
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }
        .tab {
            flex: 1;
            padding: 11px 8px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            background: var(--glass-outer);
            backdrop-filter: blur(12px);
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active {
            background: var(--btn-primary);
            color: #fff;
            border-color: transparent;
            font-weight: 600;
            box-shadow: var(--btn-shadow);
        }

        .panel {
            display: none;
            animation: fadeUp 0.25s ease;
        }
        .panel.active {
            display: block;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== 卡片 ===== */
        .card,
        .block {
            position: relative;
            background: var(--glass-mid);
            backdrop-filter: blur(22px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 20px 22px;
            margin-bottom: 14px;
            box-shadow: 0 12px 40px rgba(100, 110, 220, 0.10), 0 4px 12px rgba(0, 0, 0, 0.03), inset 0 1px 0 rgba(255, 255, 255, 0.55);
            transition: transform 0.22s ease, box-shadow 0.22s ease;
            overflow: hidden;
        }
        .card::before,
        .block::before {
            content: '';
            position: absolute;
            top: 0;
            left: 6%;
            right: 6%;
            height: 42%;
            border-radius: 18px 18px 60% 60% / 10px 10px 30% 30%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.85) 0%, rgba(255, 255, 255, 0) 100%);
            pointer-events: none;
            z-index: 0;
        }
        .card>*,
        .block>* {
            position: relative;
            z-index: 1;
        }

        /* ===== ✅ 标题居中 ===== */
        .card-title,
        .block-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-align: center;
        }

        /* ===== 网格 ===== */
        .grid-3,
        .grid-2 {
            display: grid;
            gap: 10px;
            margin-bottom: 10px;
            justify-items: center;
        }
        .grid-3 {
            grid-template-columns: repeat(3, 1fr);
        }
        .grid-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        /* ===== 输入框 ===== */
        .cell {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%;
            max-width: 140px;
        }
        .cell label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-align: center;
        }
        .cell input,
        .gear-grid input {
            width: 100%;
            min-width: 0;
            height: 46px;
            padding: 0 12px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            background: var(--input-bg);
            backdrop-filter: blur(12px);
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            text-align: center;
            outline: none;
            transition: all 0.25s ease;
            box-shadow: 0 4px 16px rgba(100, 110, 220, 0.10), 0 2px 6px rgba(0, 0, 0, 0.04),
                inset 0 -2px 4px rgba(255, 255, 255, 0.6), inset 0 2px 4px rgba(255, 255, 255, 0.9);
        }
        .cell input:focus,
        .gear-grid input:focus {
            border-color: rgba(99, 102, 241, 0.6);
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(99, 102, 241, 0.18), 0 2px 8px rgba(99, 102, 241, 0.10),
                inset 0 -2px 4px rgba(255, 255, 255, 0.7), inset 0 2px 4px rgba(255, 255, 255, 0.95),
                0 0 0 3px rgba(99, 102, 241, 0.10);
        }

        /* ===== 按钮容器 ===== */
        .btn-wrap {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 14px;
        }
        .btn-wrap-center {
            display: flex;
            justify-content: center;
            margin-top: 8px;
        }

        /* ===== 运算按钮 ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 180px;
            height: 46px;
            border: none;
            border-radius: 14px;
            background: var(--btn-primary);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--btn-shadow);
            transition: transform 0.18s, box-shadow 0.18s;
            position: relative;
            overflow: hidden;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -70%;
            width: 50%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.32), transparent);
            transform: skewX(-18deg);
            transition: left 0.55s;
        }
        .btn:hover::after {
            left: 140%;
        }

        /* ===== Loading ===== */
        .btn.loading {
            opacity: 0.9;
            cursor: not-allowed;
            pointer-events: none;
            color: transparent !important;
        }
        .btn.loading::before {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            top: 50%;
            left: 50%;
            margin: -12px 0 0 -12px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #fff;
            border-right-color: rgba(255, 255, 255, 0.4);
            animation: spinInner 0.8s linear infinite;
            z-index: 2;
        }
        .btn.loading::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            top: 50%;
            left: 50%;
            margin: -20px 0 0 -20px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: rgba(255, 255, 255, 0.6);
            border-bottom-color: rgba(255, 255, 255, 0.15);
            animation: spinOuter 1.2s linear infinite reverse;
            z-index: 2;
        }
        .btn.loading {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 50%, #7c3aed 100%) !important;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.5), 0 0 80px rgba(99, 102, 241, 0.2), var(--btn-shadow) !important;
        }
        @keyframes spinInner {
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes spinOuter {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== 大气光晕 ===== */
        .calc-aura {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.25) 0%, rgba(99, 102, 241, 0.08) 40%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: auraExpand 1.5s ease-out forwards;
        }
        [data-theme="dark"] .calc-aura {
            background: radial-gradient(circle, rgba(129, 140, 248, 0.3) 0%, rgba(129, 140, 248, 0.1) 40%, transparent 70%);
        }
        .calc-aura-2 {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9997;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 60%);
            transform: translate(-50%, -50%);
            animation: auraExpand2 1.8s ease-out 0.2s forwards;
        }
        .calc-flash {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            margin: -4px 0 0 -4px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 20px #fff, 0 0 60px rgba(99, 102, 241, 0.8), 0 0 120px rgba(99, 102, 241, 0.4);
            z-index: 9999;
            pointer-events: none;
            animation: flashPulse 0.6s ease-out forwards;
        }
        @keyframes auraExpand {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
            }
            40% {
                width: 800px;
                height: 800px;
                opacity: 0.8;
            }
            100% {
                width: 1400px;
                height: 1400px;
                opacity: 0;
            }
        }
        @keyframes auraExpand2 {
            0% {
                width: 0;
                height: 0;
                opacity: 0.8;
            }
            50% {
                width: 1000px;
                height: 1000px;
                opacity: 0.5;
            }
            100% {
                width: 1600px;
                height: 1600px;
                opacity: 0;
            }
        }
        @keyframes flashPulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(3);
                opacity: 0.8;
            }
            100% {
                transform: scale(6);
                opacity: 0;
            }
        }

        /* ===== 结果淡入 ===== */
        .result-enter {
            animation: resultIn 0.5s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }
        @keyframes resultIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== 齿轮区 ===== */
        .gear-section {
            margin-bottom: 18px;
        }
        .gear-section:last-of-type {
            margin-bottom: 14px;
        }
        .gear-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: center; /* 新增：使标题居中 */
        }
        .gear-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        /* ===== 工艺参数 ===== */
        .result-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 10px;
        }

        .result-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(6px);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02), inset 0 1px 0 rgba(255, 255, 255, 0.85);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .result-row:hover {
            background: rgba(99, 102, 241, 0.04);
        }
        .result-row.selected {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.08) 0%, rgba(129, 140, 248, 0.04) 100%);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 6px 24px rgba(99, 102, 241, 0.12), 0 0 0 2px rgba(99, 102, 241, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.85);
        }
        .result-row.selected .r-label {
            color: #6366f1;
        }
        .result-row.selected .r-value {
            color: #4f46e5;
        }

        [data-theme="dark"] .result-row {
            background: rgba(30, 41, 59, 0.6);
        }
        [data-theme="dark"] .result-row.selected {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15) 0%, rgba(129, 140, 248, 0.08) 100%);
            border-color: rgba(129, 140, 248, 0.4);
        }
        [data-theme="dark"] .result-row.selected .r-label {
            color: #a78bfa;
        }
        [data-theme="dark"] .result-row.selected .r-value {
            color: #c4b5fd;
        }

        .r-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: color 0.2s;
        }
        .r-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            transition: color 0.2s;
        }
        .r-unit {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 400;
            margin-left: 4px;
        }

        /* ===== 警告 ===== */
        .warn {
            padding: 10px 14px;
            border-radius: 12px;
            margin: 6px 0 10px;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
        }
        .warn.y {
            background: rgba(254, 243, 199, 0.9);
            color: #78350f;
        }
        .warn.r {
            background: rgba(254, 226, 226, 0.9);
            color: #7f1d1d;
        }
        [data-theme="dark"] .warn.y {
            background: rgba(113, 63, 18, 0.65);
            color: #fcd34d;
        }
        [data-theme="dark"] .warn.r {
            background: rgba(127, 29, 29, 0.65);
            color: #fca5a5;
        }

        /* ===== ✅ 齿轮方案（字体加大 + 居中） ===== */
        .gear-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin: 14px 0;
            padding: 16px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02), inset 0 1px 0 rgba(255, 255, 255, 0.85);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .gear-row:hover {
            background: rgba(99, 102, 241, 0.06);
        }
        .gear-row.selected {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.08) 0%, rgba(129, 140, 248, 0.04) 100%);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 6px 24px rgba(99, 102, 241, 0.12), 0 0 0 2px rgba(99, 102, 241, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.85);
        }
        .gear-row.selected .scheme-title {
            color: #6366f1;
        }
        .gear-row.selected .gear-info {
            transform: translateX(6px);
        }

        [data-theme="dark"] .gear-row {
            background: rgba(30, 41, 59, 0.6);
        }
        [data-theme="dark"] .gear-row.selected {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15) 0%, rgba(129, 140, 248, 0.08) 100%);
            border-color: rgba(129, 140, 248, 0.4);
        }
        [data-theme="dark"] .gear-row.selected .scheme-title {
            color: #a78bfa;
        }

        /* ✅ 标题 */
        .scheme-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
            text-align: center;
            transition: color 0.2s;
        }

        /* ✅ 齿轮信息：居中 + 字体加大 */
        .gear-info {
            flex: 1;
            text-align: center;
        }

        /* ✅ 三组齿轮：字体加大、居中 */
        .scheme-detail {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 2;
            text-align: center;
        }
        .scheme-detail div {
            margin: 4px 0;
            text-align: center;
        }

        .star-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass-outer);
            backdrop-filter: blur(8px);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            opacity: 0.5;
            flex-shrink: 0;
        }
        .star-btn:hover {
            opacity: 1;
            transform: scale(1.15);
        }
        .star-btn.starred {
            opacity: 1;
            background: rgba(251, 191, 36, 0.25);
            border-color: rgba(251, 191, 36, 0.5);
        }

        /* ===== 弹窗 ===== */
        .popup-mask {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.32);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .popup-mask.show {
            display: flex;
        }

        /* 收藏弹窗 — 背景更实，文字更清晰 */
        .note-popup {
            width: 280px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(28px);
            border-radius: 18px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.10);
        }
        [data-theme="dark"] .note-popup {
            background: rgba(28, 34, 52, 0.96);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* 收藏弹窗标题 */
        .note-popup-title {
            color: var(--text-primary);
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 12px;
            text-align: center;
        }

        .note-popup input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            outline: none;
            color: var(--text-primary);
        }
        [data-theme="dark"] .note-popup input {
            background: rgba(51, 65, 85, 0.8);
            border-color: rgba(255, 255, 255, 0.15);
            color: #f1f5f9;
        }

        /* 回填弹窗 — 背景更实，文字更清晰 */
        .confirm-popup {
            width: 300px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(28px);
            border-radius: 18px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.10);
        }
        [data-theme="dark"] .confirm-popup {
            background: rgba(28, 34, 52, 0.96);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .confirm-popup-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            text-align: center;
        }
        .confirm-popup-detail {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            line-height: 1.8;
            text-align: center;
        }
        .confirm-popup-note {
            font-size: 12px;
            color: var(--text-muted);
            font-style: italic;
            margin-bottom: 14px;
            text-align: center;
        }
        .confirm-popup-actions {
            display: flex;
            gap: 8px;
        }
        .confirm-popup-actions button {
            flex: 1;
            padding: 9px 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-primary);
        }
        [data-theme="dark"] .confirm-popup-actions button {
            background: rgba(51, 65, 85, 0.5);
            border-color: rgba(255, 255, 255, 0.08);
            color: #cbd5e1;
        }
        .confirm-popup-actions .cancel-btn:hover {
            background: rgba(255, 255, 255, 0.6);
        }

    <script>
        (function() {
            const K1 = 1345.996;
            const K2 = 3741.0728;
            const GEAR_LIST = Array.from({ length: 26 }, (_, i) => 30 + i * 2);

            const COMP_MAP = {
                30: { D: 0.9820, F: 1.1600, T: 1.4320 },
                32: { D: 0.9850, F: 1.1570, T: 1.4310 },
                34: { D: 0.9875, F: 1.1550, T: 1.4305 },
                36: { D: 0.98992, F: 1.15374, T: 1.42976 },
                38: { D: 0.9920, F: 1.1510, T: 1.4290 },
                40: { D: 0.9940, F: 1.1480, T: 1.4285 },
                42: { D: 0.99601, F: 1.14603, T: 1.43022 },
                44: { D: 0.9980, F: 1.1430, T: 1.4310 }
            };

            function getComp(TA) {
                if (COMP_MAP[TA]) return COMP_MAP[TA];
                const keys = Object.keys(COMP_MAP).map(Number).sort((a, b) => a - b);
                let l = null,
                    u = null;
                for (let k of keys) { if (k <= TA) l = k; if (k >= TA && u === null) u = k; }
                if (l === null) return COMP_MAP[keys[0]];
                if (u === null) return COMP_MAP[keys[keys.length - 1]];
                if (l === u) return COMP_MAP[l];
                const r = (TA - l) / (u - l),
                    lo = COMP_MAP[l],
                    hi = COMP_MAP[u];
                return { D: lo.D + (hi.D - lo.D) * r, F: lo.F + (hi.F - lo.F) * r, T: lo.T + (hi.T - lo.T) * r };
            }

            const storage = {
                save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (_) {} },
                load(k) { try { return JSON.parse(localStorage.getItem(k)); } catch (_) { return null; } }
            };
            const STOR_F = 'gf_f6',
                STOR_B = 'gf_b6',
                STOR_T = 'ui_t6',
                STOR_FAV = 'gf_fav6';

            const $ = id => document.getElementById(id);
            const getVal = id => parseFloat($(id).value) || 0;
            const getInt = id => parseInt($(id).value) || 0;

            const DEFAULTS = {
                trF: '86.44',
                tlF: '658.4',
                drF: '3.46',
                nuF: '13998.4',
                nlF: '14102.4',
                tA: '36',
                tB: '76',
                tC: '72',
                tD: '80',
                dA: '72',
                dB: '58',
                dC: '42',
                dD: '58',
                fA: '78',
                fB: '54',
                fC: '50',
                fD: '64',
                nuB: '13998.4',
                nlB: '14102.4'
            };

            function spawnAura() {
                const flash = document.createElement('div');
                flash.className = 'calc-flash';
                document.body.appendChild(flash);
                setTimeout(() => flash.remove(), 800);

                const el = document.createElement('div');
                el.className = 'calc-aura';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 1800);

                const el2 = document.createElement('div');
                el2.className = 'calc-aura-2';
                document.body.appendChild(el2);
                setTimeout(() => el2.remove(), 2200);
            }

            function initAutoClear() {
                document.querySelectorAll('input[type="number"]').forEach(el => {
                    if (!el.dataset.default) el.dataset.default = el.value;
                    el.addEventListener('focus', function() { if (this.value === this.dataset.default) this.value = '';
                        else this.select(); });
                    el.addEventListener('blur', function() { if (this.value === '') this.value = this.dataset.default; });
                });
            }

            function getFavs() { return storage.load(STOR_FAV) || []; }

            function saveFavs(f) { storage.save(STOR_FAV, f); }

            function isFaved(key) { return getFavs().some(f => f.key === key); }

            function addFav(scheme) {
                const favs = getFavs();
                if (!favs.some(f => f.key === scheme.key && f.note === scheme.note)) { favs.unshift(scheme);
                    saveFavs(favs); }
            }

            function removeFav(key) { saveFavs(getFavs().filter(f => f.key !== key)); }

            function clearFavs(type) { saveFavs(getFavs().filter(f => f.type !== type)); }

            function clearFavGroup(type, groupKey) { saveFavs(getFavs().filter(f => !(f.type === type && f.groupKey ===
                    groupKey))); }

            function renderFavs(containerId, type) {
                const all = getFavs(),
                    container = $(containerId);
                if (!container) return;
                const typeFavs = all.filter(f => f.type === type);
                if (typeFavs.length === 0) { container.innerHTML = '<div class="fav-empty">运算后点击 ⭐ 收藏常用方案</div>'; return; }
                const groups = {};
                typeFavs.forEach((f, idx) => {
                    const gk = f.groupKey || '默认';
                    if (!groups[gk]) groups[gk] = { items: [], indices: [] };
                    groups[gk].items.push(f);
                    groups[gk].indices.push(idx);
                });
                let html = '<div class="fav-list">';
                Object.keys(groups).forEach(gk => {
                    const grp = groups[gk],
                        gid = `${containerId}_grp_${gk.replace(/[^a-zA-Z0-9]/g,'_')}`;
                    html +=
                        `<div class="fav-group" id="${gid}"><div class="fav-group-header" onclick="window.toggleFavGroup('${gid}')"><div class="fav-group-title">📂 ${gk} <span class="fav-group-count">${grp.items.length}</span></div><div style="display:flex;align-items:center;gap:6px;"><button class="clear-group-btn" onclick="event.stopPropagation();window.clearFavGroup('${type}','${gk}');window.renderFavs('${containerId}','${type}');">🗑️ 清空本组</button><span class="fav-group-toggle">▼</span></div></div><div class="fav-group-items">`;
                    grp.items.forEach((f, si) => {
                        html +=
                            `<div class="fav-item" data-type="${f.type}" data-idx="${grp.indices[si]}"><div class="fav-info" data-idx="${grp.indices[si]}"><div class="fav-title">${f.note?'📝 '+f.note:f.title}</div>${f.note?`<div class="fav-note">${f.title}</div>`:''}<div class="fav-detail">卷取：${f.gear.take} ｜ 牵伸：${f.gear.draw} ｜ 喂入：${f.gear.feed}</div></div><div class="fav-actions"><button class="del-btn" data-key="${f.key}" data-type="${f.type}">删除</button></div></div>`;
                    });
                    html += '</div></div>';
                });
                html += '</div>';
                container.innerHTML = html;
                container.querySelectorAll('.fav-info').forEach(el => { const idx = +el.dataset.idx,
                        f = typeFavs[idx]; if (f) initLongPressFill(el, f); });
                container.querySelectorAll('.del-btn').forEach(btn => btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    removeFav(this.dataset.key);
                    renderFavs(containerId, type);
                }));
            }
            window.renderFavs = renderFavs;
            window.clearFavGroup = clearFavGroup;
            window.clearFavs = clearFavs;
            window.toggleFavGroup = function(id) { const el = document.getElementById(id); if (el) el.classList.toggle(
                    'collapsed'); };

            let pendingFillScheme = null;

            function initLongPressFill(el, scheme) {
                let timer = null,
                    ringEl = null;

                function startPress(e) {
                    e.preventDefault();
                    const pos = e.touches ? e.touches[0] : e;
                    ringEl = document.createElement('div');
                    ringEl.className = 'longpress-ring';
                    ringEl.style.left = pos.clientX + 'px';
                    ringEl.style.top = pos.clientY + 'px';
                    document.body.appendChild(ringEl);
                    timer = setTimeout(() => {
                        if (ringEl) { ringEl.remove();
                            ringEl = null; }
                        pendingFillScheme = scheme;
                        $('fillDetail').innerHTML =
                            `卷取：${scheme.gear.take} ｜ 牵伸：${scheme.gear.draw} ｜ 喂入：${scheme.gear.feed}`;
                        $('fillNote').textContent = scheme.note ? `备注：${scheme.note}` : '';
                        $('fillMask').classList.add('show');
                    }, 500);
                }

                function cancelPress() { if (timer) { clearTimeout(timer);
                        timer = null; } if (ringEl) { ringEl.remove();
                        ringEl = null; } }
                el.addEventListener('touchstart', startPress, { passive: false });
                el.addEventListener('touchend', cancelPress);
                el.addEventListener('touchmove', cancelPress, { passive: true });
                el.addEventListener('touchcancel', cancelPress);
                el.addEventListener('mousedown', e => { if (e.button === 0) startPress(e); });
                el.addEventListener('mouseup', cancelPress);
                el.addEventListener('mouseleave', cancelPress);
            }

            $('fillOk').addEventListener('click', () => { $('fillMask').classList.remove('show'); if (pendingFillScheme) {
                    fillInputsAndCalc(pendingFillScheme);
                    pendingFillScheme = null; } });
            $('fillCancel').addEventListener('click', () => { $('fillMask').classList.remove('show');
                pendingFillScheme = null; });
            $('fillMask').addEventListener('click', e => { if (e.target === $('fillMask')) { $('fillMask').classList.remove(
                        'show');
                    pendingFillScheme = null; } });

            function fillInputsAndCalc(scheme) {
                if (scheme.type === 'fwd') {
                    $('trF').value = scheme.params.tr;
                    $('tlF').value = scheme.params.tl;
                    $('drF').value = scheme.params.dr;
                    switchTab('fwd');
                    setTimeout(() => { if (!lock) runForward(); }, 100);
                }
                if (scheme.type === 'bwd') {
                    const p = scheme.key.split('_');
                    $('tA').value = p[1];
                    $('tB').value = p[2];
                    $('tC').value = p[3];
                    $('tD').value = p[4];
                    $('dA').value = p[5];
                    $('dB').value = p[6];
                    $('dC').value = p[7];
                    $('dD').value = p[8];
                    $('fA').value = p[9];
                    $('fB').value = p[10];
                    $('fC').value = p[11];
                    $('fD').value = p[12];
                    switchTab('bwd');
                    setTimeout(() => { if (!lock) runBackward(); }, 100);
                }
            }

            let pendingScheme = null;

            function showNotePopup(scheme) {
                pendingScheme = scheme;
                $('noteInput').value = '';
                $('noteMask').classList.add('show');
                setTimeout(() => $('noteInput').focus(), 100);
                $('noteMask').onclick = e => { if (e.target === $('noteMask')) { $('noteMask').classList.remove('show');
                        pendingScheme = null; } };
            }

            function confirmNote() {
                const note = $('noteInput').value.trim();
                if (pendingScheme) { pendingScheme.note = note;
                    addFav(pendingScheme);
                    $('noteMask').classList.remove('show');
                    pendingScheme = null;
                    refreshLastResult(); }
            }
            $('noteConfirm').addEventListener('click', confirmNote);
            $('noteSkip').addEventListener('click', () => { if (pendingScheme) { addFav(pendingScheme);
                    $('noteMask').classList.remove('show');
                    pendingScheme = null;
                    refreshLastResult(); } });
            $('noteInput').addEventListener('keydown', e => { if (e.key === 'Enter') confirmNote(); if (e.key === 'Escape') {
                    $('noteMask').classList.remove('show');
                    pendingScheme = null; } });

            function refreshLastResult() {
                const a = document.querySelector('.panel.active');
                if (a && a.id === 'panelFwd' && lastFwdData) renderFwdResult.apply(null, lastFwdData);
                if (a && a.id === 'panelBwd' && lastBwdData) renderBwdResult.apply(null, lastBwdData);
            }

            function getTop2(target) {
                const arr = [];
                for (const b of GEAR_LIST)
                    for (const c of GEAR_LIST) arr.push({ B: b, C: c, err: Math.abs(c / b - target) / (target || 1e-9) });
                return arr.sort((a, b) => a.err - b.err).slice(0, 2);
            }

            function calcLineSpeed(nl, tl, tr, dr) { const Vd = nl / tl,
                    Vt = Vd * tr / 100,
                    Vf = Vd / dr; return { Vt, Vd, Vf }; }

            function schemeKey(type, gear) {
                if (type === 'fwd') return `fwd_${gear.gT.B}_${gear.gT.C}_${gear.gD.B}_${gear.gD.C}_${gear.gF.B}_${gear.gF.C}`;
                else
                    return `bwd_${getInt('tA')}_${getInt('tB')}_${getInt('tC')}_${getInt('tD')}_${getInt('dA')}_${getInt('dB')}_${getInt('dC')}_${getInt('dD')}_${getInt('fA')}_${getInt('fB')}_${getInt('fC')}_${getInt('fD')}`;
            }

            function clearErrors(scope) { scope.querySelectorAll('input').forEach(i => i.classList.remove('error')); }

            let lastFwdData = null,
                lastBwdData = null,
                copyText = '',
                lock = false;

            function runForward() {
                if (lock) return;
                const btn = $('calcF');
                lock = true;
                btn.classList.add('loading');
                spawnAura();
                btn.innerHTML = '🚀 运算中…';
                setTimeout(() => {
                    try {
                        clearErrors($('panelFwd'));
                        const tr = getVal('trF'),
                            tl = getVal('tlF'),
                            dr = getVal('drF'),
                            nu = getVal('nuF'),
                            nl = getVal('nlF');
                        if ([tr, tl, dr, nu, nl].some(v => v <= 0 || isNaN(v))) throw new Error('参数须为正数');
                        if (tr < 0 || tr > 100) throw new Error('张力比须在 0~100 之间');
                        if (tl < 500 || tl > 3000) throw new Error('下捻须在 500~3000 之间');
                        if (dr < 0.5 || dr > 5) throw new Error('牵伸倍数须在 0.5~5 之间');
                        if (nu < 5000 || nu > 20000 || nl < 5000 || nl > 20000) throw new Error('锭速须在 5000~20000 之间');
                        storage.save(STOR_F, { tr, tl, dr, nu, nl });
                        const offT = [-10, 0, 10],
                            offD = [-0.05, 0, 0.05],
                            all = [];
                        for (const dt of offT) { const nt = tl + dt; if (nt <= 0) continue; for (const dd of offD) { const nd =
                                    dr + dd; if (nd <= 0) continue; const rD = K1 / nt,
                                    rF = K2 / (nt * nd),
                                    rT = tr / 100,
                                    gD = getTop2(rD),
                                    gF = getTop2(rF),
                                    gT = getTop2(rT); for (const gd of gD)
                                for (const gf of gF)
                                    for (const gt of gT) all.push({ tl: nt, dr: nd, tr: tr / 100, gD: gd, gF: gf,
                                        gT: gt, totalErr: gd.err + gf.err + gt.err }); } }
                        if (all.length === 0) throw new Error('未找到有效齿轮组合');
                        const groups = all.sort((a, b) => a.totalErr - b.totalErr).slice(0, 2);
                        const { Vt, Vd, Vf } = calcLineSpeed(nl, tl, tr, dr),
                            Tu = nu / Vd;
                        let w = '';
                        if (Math.abs(Tu - tl) > 300) w += '<div class="warn y">⚠️ 上下捻度差距较大，请复核</div>';
                        if (Vt > 600) w += '<div class="warn r">⚠️ 卷取速度偏高，请注意安全</div>';
                        let txt = `正向计算\n`;
                        groups.forEach((g, i) => txt +=
                            `方案${i+1}: 卷取40-${g.gT.B}-${g.gT.C}-80  牵伸72-${g.gD.B}-${g.gD.C}-58  喂入78-${g.gF.B}-${g.gF.C}-64\n`
                            );
                        txt +=
                            `\nTl=${tl.toFixed(1)}  TR=${tr.toFixed(2)}%  DR=${dr.toFixed(2)}\nTu=${Tu.toFixed(1)}  卷取线速=${Vt.toFixed(2)} 牵伸线速=${Vd.toFixed(2)} 喂入线速=${Vf.toFixed(2)}`;
                        renderFwdResult(groups, tr, tl, dr, Vt, Vd, Vf, Tu, w, txt);
                    } catch (e) { $('resF').innerHTML = `<div class="warn r">错误：${e.message}</div>`; } finally { lock =
                            false;
                        btn.classList.remove('loading');
                        btn.innerHTML = '🚀 开始运算'; }
                }, 1200);
            }

            function renderFwdResult(groups, tr, tl, dr, Vt, Vd, Vf, Tu, warnHtml, copyTextData) {
                lastFwdData = arguments;
                copyText = copyTextData;
                let html = warnHtml || '';
                html += '<div class="block"><div class="block-title">⚙️ 2 套最优齿轮方案</div>';
                groups.forEach((g, i) => {
                    const key = schemeKey('fwd', g),
                        starred = isFaved(key);
                    const gT = `40-${g.gT.B}-${g.gT.C}-80`,
                        gD = `72-${g.gD.B}-${g.gD.C}-58`,
                        gF = `78-${g.gF.B}-${g.gF.C}-64`;
                    html +=
                        `<div class="gear-row" onclick="window.selectGearRow(this)"><div class="gear-info"><div class="scheme-title">方案 ${i+1}（综合偏差 ${(g.totalErr*100).toFixed(2)}%）</div><div class="scheme-detail"><div>📐 卷取：${gT}</div><div>🔧 牵伸：${gD}</div><div>📥 喂入：${gF}</div></div></div><button class="star-btn ${starred?'starred':''}" data-scheme='${JSON.stringify({key,type:'fwd',groupKey:'正向方案',title:`方案 ${i+1}（偏差 ${(g.totalErr*100).toFixed(2)}%）`,gear:{take:gT,draw:gD,feed:gF},params:{tr,tl,dr}})}'>${starred?'⭐':'☆'}</button></div>`;
                });
                html += '</div>';

                html +=
                    '<div class="block" style="padding:16px 18px;"><div class="block-title" style="margin-bottom:8px;">⚙️工艺参数</div><div class="result-list">';
                [
                    ['卷取线速', Vt.toFixed(2), 'm/min'],
                    ['牵伸线速', Vd.toFixed(2), 'm/min'],
                    ['喂入线速', Vf.toFixed(2), 'm/min'],
                    ['Tu（上捻）', Tu.toFixed(1), '捻/m'],
                    ['Tl（下捻）', tl.toFixed(1), '捻/m'],
                    ['牵伸 DR', dr.toFixed(2), ''],
                    ['张力比 TR', tr.toFixed(2), '%']
                ].forEach(r => {
                    html +=
                        `<div class="result-row" onclick="window.selectResultRow(this)"><span class="r-label">${r[0]}</span><span><span class="r-value">${r[1]}</span><span class="r-unit">${r[2]}</span></span></div>`;
                });
                html += '</div></div>';

                const fw = getFavs().filter(f => f.type === 'fwd');
                html +=
                    `<div class="block" id="favListFwd"><div class="block-title">⭐ 已收藏方案（长按 0.5 秒 → 确认回填）${fw.length>0?`<span class="block-title-actions"><button class="clear-fav-btn" onclick="clearFavs('fwd');renderFavs('favListFwd','fwd');">全部清空</button></span>`:''}</div></div>`;
                html += '<div class="copy-wrap"><button class="copy-btn" id="copyFwdBtn">📋 复制数据</button></div>';
                $('resF').innerHTML = html;
                $('resF').classList.add('result-enter');
                $('resF').querySelectorAll('.star-btn').forEach(btn => btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const s = JSON.parse(this.dataset.scheme);
                    isFaved(s.key) ? (removeFav(s.key), renderFwdResult.apply(null, lastFwdData)) : showNotePopup(
                    s);
                }));
                $('copyFwdBtn')?.addEventListener('click', copyResult);
                renderFavs('favListFwd', 'fwd');
            }

            function runBackward() {
                if (lock) return;
                const btn = $('calcB');
                lock = true;
                btn.classList.add('loading');
                spawnAura();
                btn.innerHTML = '🚀 反推中…';
                setTimeout(() => {
                    try {
                        clearErrors($('panelBwd'));
                        const nu = getVal('nuB'),
                            nl = getVal('nlB'),
                            tA = getInt('tA'),
                            tB = getInt('tB'),
                            tC = getInt('tC'),
                            tD = getInt('tD'),
                            dA = getInt('dA'),
                            dB = getInt('dB'),
                            dC = getInt('dC'),
                            dD = getInt('dD'),
                            fA = getInt('fA'),
                            fB = getInt('fB'),
                            fC = getInt('fC'),
                            fD = getInt('fD');
                        if ([nu, nl, tA, tB, tC, tD, dA, dB, dC, dD, fA, fB, fC, fD].some(v => v <= 0 || isNaN(v)))
                            throw new Error('所有参数须为正数');
                        if (nu < 5000 || nu > 20000 || nl < 5000 || nl > 20000) throw new Error('锭速须在 5000~20000 之间');
                        if ([tA, tB, tC, tD, dA, dB, dC, dD, fA, fB, fC, fD].some(v => v < 30 || v > 80 || v % 2 !== 0))
                            throw new Error('齿轮齿数须为 30~80 的偶数');
                        storage.save(STOR_B, { nu, nl, tA, tB, tC, tD, dA, dB, dC, dD, fA, fB, fC, fD });
                        const iD = (dA * dC) / (dB * dD),
                            iF = (fA * fC) / (fB * fD),
                            iT = (tA * tC) / (tB * tD),
                            comp = getComp(tA);
                        const TlRaw = K1 / iD,
                            Tl = TlRaw * comp.D,
                            DR = (K2 / (iF * TlRaw)) * comp.F,
                            TR = iT * 100 * comp.T;
                        const { Vt, Vd, Vf } = calcLineSpeed(nl, Tl, TR, DR),
                            Tu = nu / Vd;
                        let w = '';
                        if (Math.abs(Tu - Tl) > 300) w += '<div class="warn y">⚠️ 上下捻度差距较大，请复核</div>';
                        let txt =
                            `反向计算\n齿轮: 卷取${tA}-${tB}-${tC}-${tD}  牵伸${dA}-${dB}-${dC}-${dD}  喂入${fA}-${fB}-${fC}-${fD}\n\niD=${iD.toFixed(6)}  iF=${iF.toFixed(6)}  iT=${iT.toFixed(6)}\nTl=${Tl.toFixed(1)}  DR=${DR.toFixed(2)}  TR=${TR.toFixed(2)}%\nTu=${Tu.toFixed(1)}  卷取线速=${Vt.toFixed(2)} 牵伸线速=${Vd.toFixed(2)} 喂入线速=${Vf.toFixed(2)}`;
                        renderBwdResult(Tl, DR, TR, iD, iF, iT, Vt, Vd, Vf, Tu, w, txt);
                    } catch (e) { $('resB').innerHTML = `<div class="warn r">错误：${e.message}</div>`; } finally { lock =
                            false;
                        btn.classList.remove('loading');
                        btn.innerHTML = '🚀 反推运算'; }
                }, 1200);
            }

            function renderBwdResult(Tl, DR, TR, iD, iF, iT, Vt, Vd, Vf, Tu, warnHtml, copyTextData) {
                lastBwdData = arguments;
                copyText = copyTextData;
                let html = warnHtml || '';
                const tA = getInt('tA'),
                    tB = getInt('tB'),
                    tC = getInt('tC'),
                    tD = getInt('tD'),
                    dA = getInt('dA'),
                    dB = getInt('dB'),
                    dC = getInt('dC'),
                    dD = getInt('dD'),
                    fA = getInt('fA'),
                    fB = getInt('fB'),
                    fC = getInt('fC'),
                    fD = getInt('fD');
                const key = schemeKey('bwd'),
                    starred = isFaved(key);
                html +=
                    `<div class="gear-row" onclick="window.selectGearRow(this)"><div class="gear-info"><div class="scheme-title">⚙️ 当前齿轮方案</div><div class="scheme-detail"><div>📐 卷取：${tA}-${tB}-${tC}-${tD}</div><div>🔧 牵伸：${dA}-${dB}-${dC}-${dD}</div><div>📥 喂入：${fA}-${fB}-${fC}-${fD}</div><div style="margin-top:4px;">iD=${iD.toFixed(6)} ｜ iF=${iF.toFixed(6)} ｜ iT=${iT.toFixed(6)}</div></div></div><button class="star-btn ${starred?'starred':''}" data-scheme='${JSON.stringify({key,type:'bwd',groupKey:`反向方案 A齿=${tA}`,title:`齿轮方案（A齿${tA}）`,gear:{take:`${tA}-${tB}-${tC}-${tD}`,draw:`${dA}-${dB}-${dC}-${dD}`,feed:`${fA}-${fB}-${fC}-${fD}`},params:{}})}'>${starred?'⭐':'☆'}</button></div>`;

                html +=
                    '<div class="block" style="padding:16px 18px;"><div class="block-title" style="margin-bottom:8px;">⚙️工艺参数</div><div class="result-list">';
                [
                    ['卷取线速', Vt.toFixed(2), 'm/min'],
                    ['牵伸线速', Vd.toFixed(2), 'm/min'],
                    ['喂入线速', Vf.toFixed(2), 'm/min'],
                    ['Tl（下捻）', Tl.toFixed(1), '捻/m'],
                    ['Tu（上捻）', Tu.toFixed(1), '捻/m'],
                    ['牵伸 DR', DR.toFixed(2), ''],
                    ['张力比 TR', TR.toFixed(2), '%']
                ].forEach(r => {
                    html +=
                        `<div class="result-row" onclick="window.selectResultRow(this)"><span class="r-label">${r[0]}</span><span><span class="r-value">${r[1]}</span><span class="r-unit">${r[2]}</span></span></div>`;
                });
                html += '</div></div>';

                const bw = getFavs().filter(f => f.type === 'bwd');
                html +=
                    `<div class="block" id="favListBwd"><div class="block-title">⭐ 已收藏方案（长按 0.5 秒 → 确认回填）${bw.length>0?`<span class="block-title-actions"><button class="clear-fav-btn" onclick="clearFavs('bwd');renderFavs('favListBwd','bwd');">全部清空</button></span>`:''}</div></div>`;
                html += '<div class="copy-wrap"><button class="copy-btn" id="copyBwdBtn">📋 复制数据</button></div>';
                $('resB').innerHTML = html;
                $('resB').classList.add('result-enter');
                $('resB').querySelector('.star-btn')?.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const s = JSON.parse(this.dataset.scheme);
                    isFaved(s.key) ? (removeFav(s.key), renderBwdResult.apply(null, lastBwdData)) : showNotePopup(
                    s);
                });
                $('copyBwdBtn')?.addEventListener('click', copyResult);
                renderFavs('favListBwd', 'bwd');
            }

            function copyResult() {
                if (!copyText) return alert('请先运算生成数据');
                if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(copyText).then(() =>
                    alert('✅ 已复制到剪贴板')).catch(fallbackCopy);
                else fallbackCopy();

                function fallbackCopy() { const ta = document.createElement('textarea');
                    ta.value = copyText;
                    document.body.appendChild(ta);
                    ta.select(); try { document.execCommand('copy');
                        alert('✅ 已复制到剪贴板'); } catch (e) { alert('复制失败，请手动复制'); } document.body.removeChild(ta); }
            }

            function switchTab(t) {
                document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                document.querySelector(`.tab[data-tab="${t}"]`)?.classList.add('active');
                document.querySelector(`#panel${t==='fwd'?'Fwd':'Bwd'}`)?.classList.add('active');
            }

            function resetForward() { ['trF', 'tlF', 'drF', 'nuF', 'nlF'].forEach(id => { const el = $(id); if (el) el
                        .value = DEFAULTS[id]; });
                $('resF').innerHTML = ''; }

            function resetBackward() { ['nuB', 'nlB', 'tA', 'tB', 'tC', 'tD', 'dA', 'dB', 'dC', 'dD', 'fA', 'fB', 'fC',
                    'fD'
                ].forEach(id => { const el = $(id); if (el) el.value = DEFAULTS[id]; });
                $('resB').innerHTML = ''; }

            function initTheme() { if (storage.load(STOR_T) === 'dark') document.body.setAttribute('data-theme', 'dark'); }

            function toggleTheme() { document.body.hasAttribute('data-theme') ? (document.body.removeAttribute(
                    'data-theme'), storage.save(STOR_T, 'light')) : (document.body.setAttribute('data-theme', 'dark'),
                    storage.save(STOR_T, 'dark')); }

            window.selectGearRow = function(el) {
                document.querySelectorAll('.gear-row.selected').forEach(r => r.classList.remove('selected'));
                el.classList.add('selected');
            };

            window.selectResultRow = function(el) {
                document.querySelectorAll('.result-row.selected').forEach(r => r.classList.remove('selected'));
                el.classList.add('selected');
            };

            function init() {
                initTheme();
                const fc = storage.load(STOR_F);
                if (fc) Object.keys(fc).forEach(k => { const e = $(k); if (e) e.value = fc[k]; });
                const bc = storage.load(STOR_B);
                if (bc) Object.keys(bc).forEach(k => { const e = $(k); if (e) e.value = bc[k]; });
                initAutoClear();
                document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset
                    .tab)));
                $('calcF').addEventListener('click', runForward);
                $('calcB').addEventListener('click', runBackward);
                $('resetF').addEventListener('click', resetForward);
                $('resetB').addEventListener('click', resetBackward);
                $('themeBtn').addEventListener('click', toggleTheme);
                $('helpBtn').addEventListener('click', () => $('helpModal').classList.add('show'));
                $('closeHelpBtn').addEventListener('click', () => $('helpModal').classList.remove('show'));
                $('helpModal').addEventListener('click', e => { if (e.target === $('helpModal')) $('helpModal')
                        .classList.remove('show'); });
                document.addEventListener('keydown', e => {
                    if (e.key === 'Escape' && $('helpModal').classList.contains('show')) $('helpModal')
                        .classList.remove('show');
                    if (e.key === 'Enter' && document.activeElement?.tagName === 'INPUT') { const p = document
                            .querySelector('.panel.active'); if (p?.id === 'panelFwd') runForward();
                        else if (p?.id === 'panelBwd') runBackward(); }
                });
            }

            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
            else init();
        })();
    </script>

</body>
</html>
